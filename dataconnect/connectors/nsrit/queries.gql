query GetBranchDetails($branchId: UUID!) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin required") {
    id
    role
  }
  branch(id: $branchId) {
    id
    name
    branchCode
    address
    city
    state
    pincode
    phone
    email
    status
    branchAdminId
    principalId
    isActive
    branchAdmin {
      id
      fullName
      phoneNumber
      role
      isActive
    }
    principal {
      id
      fullName
      phoneNumber
      role
      isActive
    }
  }
  academicClasses(where: {branchId: {eq: $branchId}}, limit: 500) {
    id
    branchId
    wingId
    name
    displayOrder
    isActive
  }
  sections(where: {branchId: {eq: $branchId}}, limit: 500) {
    id
    branchId
    wingId
    academicClassId
    name
    isActive
    academicClass {
      id
      name
    }
  }
  students(where: {branchId: {eq: $branchId}}, limit: 1000) {
    id
    studentId
    fullName
    academicClassId
    sectionId
    isActive
  }
  users(where: {branchId: {eq: $branchId}, isActive: {eq: true}}, limit: 500) {
    id
    fullName
    phoneNumber
    role
    branchId
    isActive
  }
  teacherAssignments(where: {branchId: {eq: $branchId}, isActive: {eq: true}}, limit: 500) {
    id
    teacherId
    sectionId
    isClassTeacher
    teacher {
      id
      fullName
      phoneNumber
      role
    }
  }
  attendances(where: {section: {branchId: {eq: $branchId}}}, limit: 1000) {
    id
    status
    attendanceDate
  }
  studentFees(where: {student: {branchId: {eq: $branchId}}}, limit: 1000) {
    id
    totalFee
    paidAmount
    remainingAmount
    status
    dueDate
  }
}

query GetUsersByRole(
  $role: String!
  $alternateRole: String!
  $searchText: String!
  $limit: Int = 25
) @auth(level: USER) {
  currentUser: users(
    where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
    limit: 1
  ) @redact @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin required") {
    id
    role
  }
  users(
    where: {
      _and: [
        {isActive: {eq: true}}
        {_or: [{role: {eq: $role}}, {role: {eq: $alternateRole}}]}
        {
          _or: [
            {fullName: {contains: $searchText}}
            {phoneNumber: {contains: $searchText}}
          ]
        }
      ]
    }
    limit: $limit
  ) {
    id
    fullName
    phoneNumber
    role
    branchId
    isActive
  }
}

query GetAssignmentConflicts($userId: UUID!) @auth(level: USER) {
  currentUser: users(
