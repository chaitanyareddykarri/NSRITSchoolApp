query GetAttendanceByMonth($studentId: UUID!, $fromDate: Date!, $toDate: Date!) @auth(level: USER) {
  attendances(
    where: {
      studentId: {eq: $studentId}
      attendanceDate: {ge: $fromDate, le: $toDate}
    }
  ) {
    id
    studentId
    academicClassId
    sectionId
    attendanceDate
    status
    markedById
    editedById
    remarks
    createdAt
  }
}

