query SearchStudents($branchId: UUID!, $searchText: String!, $limit: Int = 25) @auth(level: USER) {
  students(
    where: {
      _and: [
        {branchId: {eq: $branchId}}
        {isActive: {eq: true}}
        {
          _or: [
            {studentId: {contains: $searchText}}
            {fullName: {contains: $searchText}}
            {phoneNumber: {contains: $searchText}}
          ]
        }
      ]
    }
    limit: $limit
  ) {
    id
    studentId
    fullName
    branchId
    wingId
    academicClassId
    sectionId
    parentId
    phoneNumber
    admissionDate
  }
}

