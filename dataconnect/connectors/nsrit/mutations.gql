mutation CreateStudent(
  $studentId: String!
  $admissionYear: Int!
  $branchCode: String!
  $serialNumber: Int!
  $fullName: String!
  $gender: String
  $dateOfBirth: Date
  $branchId: UUID!
  $wingId: UUID
  $academicClassId: UUID!
  $sectionId: UUID!
  $parentId: UUID!
  $countryCode: String
  $phoneNumber: String
  $address: String
  $admissionDate: Date!
) @auth(level: USER) @transaction {
  studentIdSequence_upsert(
    data: {
      admissionYear: $admissionYear
      branchCode: $branchCode
      lastSerialNumber: $serialNumber
      updatedAt_expr: "request.time"
    }
  )
  student_insert(
    data: {
      studentId: $studentId
      admissionYear: $admissionYear
      branchCode: $branchCode
      serialNumber: $serialNumber
      fullName: $fullName
      gender: $gender
      dateOfBirth: $dateOfBirth
      branch: {id: $branchId}
      wing: {id: $wingId}
      academicClass: {id: $academicClassId}
      section: {id: $sectionId}
      parent: {id: $parentId}
      countryCode: $countryCode
      phoneNumber: $phoneNumber
      address: $address
      admissionDate: $admissionDate
      isActive: true
      updatedAt_expr: "request.time"
    }
  )
}

