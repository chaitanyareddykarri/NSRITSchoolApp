mutation CreateBranch(
  $name: String!
  $branchCode: String!
  $address: String
  $city: String
  $state: String
  $pincode: String
  $phone: String
  $email: String
  $status: String = "ACTIVE"
) @auth(level: USER) {
  branch_insert(
    data: {
      name: $name
      branchCode: $branchCode
      address: $address
      city: $city
      state: $state
      pincode: $pincode
      phone: $phone
      email: $email
      status: $status
      isActive: true
      updatedAt_expr: "request.time"
    }
  )
}

mutation UpdateBranch(
  $id: UUID!
  $name: String!
  $address: String
  $city: String
  $state: String
  $pincode: String
  $phone: String
  $email: String
  $status: String!
  $isActive: Boolean!
) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin required") {
      id
      role
    }
  }
  branch_update(
    id: $id
    data: {
      name: $name
      address: $address
      city: $city
      state: $state
      pincode: $pincode
      phone: $phone
      email: $email
      status: $status
      isActive: $isActive
      updatedAt_expr: "request.time"
    }
  )
}

mutation AssignBranchAdmin($branchId: UUID!, $branchAdminId: UUID!) @auth(level: USER) @transaction {
  query @redact {
    users(
      where: {firebaseUID: {eq_expr: "auth.uid"}, isActive: {eq: true}}
      limit: 1
    ) @check(expr: "this.exists(u, u.role == 'MAIN_ADMIN' || u.role == 'main_admin')", message: "Main Admin required") {
      id
      role
    }
  }
  branch_update(
    id: $branchId
    data: {
      branchAdmin: {id: $branchAdminId}
      updatedAt_expr: "request.time"
    }
  )
}

